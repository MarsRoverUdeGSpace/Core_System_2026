; ==========================
; Kukulcan (ESP32-S3R8)
; ==========================

[env:kukulcan]
platform = espressif32
board = kukulcan_esp32s3
framework = arduino

; -------- Serial / Upload --------
; Prefer stable symlink paths (avoid /dev/ttyACM0)
upload_port  = /dev/serial/by-id/usb-Espressif_USB_JTAG_serial_debug_unit_9C:13:9E:8D:29:90-if00
monitor_port = ${env:kukulcan.upload_port}

; Keep upload speed explicit for repeatability
upload_speed  = 921600
monitor_speed = 921600

; Optional: add timestamps to logs
monitor_filters = time

; -------- Build flags --------
build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DBOARD_HAS_PSRAM
  ; Optional: increase default log buffer stability for high baud
  ; -DCORE_DEBUG_LEVEL=3

; -------- micro-ROS --------
board_microros_distro = jazzy
board_microros_transport = serial

; If you ever switch to UART transport, make it explicit here
; board_microros_transport = serial
; board_microros_transport = wifi
; board_microros_transport = ethernet

; -------- Dependencies --------
lib_deps =
  https://github.com/micro-ROS/micro_ros_platformio
  https://github.com/basicmicro/roboclaw_arduino_library
  https://github.com/mikalhart/TinyGPSPlus
  adafruit/Adafruit NeoPixel@^1.12.4

; Optional: ensure libraries are resolved predictably
lib_ldf_mode = chain+

